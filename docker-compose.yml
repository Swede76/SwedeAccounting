version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: swedeaccounting
      POSTGRES_USER: accounting_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://accounting_user:secure_password@db:5432/swedeaccounting
      SECRET_KEY: your-secret-key
      JWT_SECRET_KEY: your-jwt-secret
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./frontend:/app/static

volumes:
  postgres_data:
